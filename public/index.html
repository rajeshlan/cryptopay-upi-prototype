<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CryptoPay UPI (Demo)</title>

  <!-- ✅ Dummy favicon to silence 404 -->
  <link rel="icon" href="data:," />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="demo-badge">DEMO · SIMULATION</div>

<div class="container">
  <div class="card">
    <h2>CryptoPay UPI</h2>
    <p class="subtitle">Demo prototype — no real transfers occur.</p>

    <!-- Demo Wallet Balance -->
    <div
      id="walletBox"
      style="
        margin-top:10px;
        padding:8px;
        border-radius:6px;
        background:#020617;
        font-size:13px;
      "
    >
      💰 Demo Wallet (INR): <b>Loading...</b>
    </div>

    <!-- Execution Status -->
    <div id="executionStatus" class="status-pill idle">
      ⏸ Idle
    </div>

    <textarea
      id="qrtext"
      placeholder="Paste UPI QR text (optional)"
    ></textarea>

    <button onclick="parseQR()">Parse QR</button>

    <input type="file" id="qrimage" accept="image/*" />
    <button onclick="scanQRImage()">Scan QR Image</button>

    <input id="upi" placeholder="Enter UPI ID" />
    <input
      id="amount"
      type="number"
      placeholder="Crypto amount (USDT)"
    />

    <button onclick="pay()">Pay</button>

    <pre id="result"></pre>

    <div class="status-box">
      Status:
      <span class="latest-status pending">IDLE</span>
    </div>

    <h3>Recent Transactions</h3>
    <div id="history"></div>

    <p class="footer">Proof-of-concept · Crypto → UPI</p>
  </div>
</div>

<!-- 🧠 Execution Timeline Modal -->
<div id="timelineModal" class="modal hidden">
  <div class="modal-content">
    <h3>Execution Timeline</h3>
    <div id="timelineBody"></div>
    <button onclick="closeTimeline()">Close</button>
  </div>
</div>

<!-- 🔐 REQUIRED: CryptoJS (MUST LOAD FIRST) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

<!-- 📷 QR Decoder -->
<script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>

<!-- 🚀 App Logic (LAST) -->
<script src="app.js"></script>

</body>
</html>
